const AI = {
  MODEL: 'claude-sonnet-4-20250514',

  studentCtx() {
    const s = COURSE_CONFIG.student;
    return `Student: ${s.name}, Grade ${s.grade}, ${s.state}. PSAT: ${s.baseline.total} total (R&W: ${s.baseline.rw} at 32nd percentile, Math: ${s.baseline.math} at 51st percentile). Weaknesses: Expression of Ideas (370-410), Algebra (420-460), Advanced Math (420-460). Strengths: Craft & Structure (490-540), Data Analysis (550-600), Geometry (550-600). 8-week SAT target: ${s.target.total}+.`;
  },

  async call(userPrompt, systemPrompt) {
    try {
      const res = await fetch('https://eybkidirqmmavbsbomlj.supabase.co/functions/v1/sat-tutor-proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: this.MODEL,
          max_tokens: 1000,
          system: systemPrompt || `You are an expert SAT tutor. ${this.studentCtx()}`,
          messages: [{ role: 'user', content: userPrompt }]
        })
      });
      const data = await res.json();
      if (data.error) return `AI Error: ${data.error.message}`;
      return data.content?.[0]?.text || 'No response received.';
    } catch(e) {
      return 'Unable to reach AI tutor. Please check your connection and try again.';
    }
  },

  // Feature 1 (Priority): Personalized wrong-answer feedback
  async explainWrongAnswer(drill, chosenIdx, correctIdx, lessonCtx) {
    const sys = `You are an expert SAT tutor giving personalized feedback. ${this.studentCtx()} Be direct, warm, and specific. Under 90 words total. Do not use bullet points.`;
    const prompt = `Lesson: "${lessonCtx.title}" (${lessonCtx.module})
Question: ${drill.stem}
Correct answer: ${['A','B','C','D'][correctIdx]}) ${drill.choices[correctIdx]}
Student chose: ${['A','B','C','D'][chosenIdx]}) ${drill.choices[chosenIdx]}
Pre-written explanation: ${drill.explanation}
${drill.trap ? 'Trap label: ' + drill.trap : ''}

In 2-3 sentences: (1) explain specifically why HER chosen answer was wrong, referencing her exact choice; (2) explain why the correct answer is right; (3) give one actionable tip she can apply to the next similar question. Be encouraging and personal.`;
    return this.call(prompt, sys);
  },

  // Feature 5: Branching review content
  async getBranchReview(drill, chosenIdx, correctIdx, moduleTitle) {
    const sys = `You are an SAT tutor creating a targeted mini-lesson. ${this.studentCtx()} Under 130 words. Plain paragraphs only — no headers, no bullets.`;
    const prompt = `A student just got this wrong:
Question: ${drill.stem}
She chose: ${drill.choices[chosenIdx]}
Correct: ${drill.choices[correctIdx]}
Module: ${moduleTitle}
${drill.explanation}

Write a 3-4 sentence targeted mini-lesson that: (1) re-explains the core concept she missed, (2) gives a concrete rule or test she can apply immediately, (3) ends with a single clear sentence she can use as a mental anchor for similar questions. Make it feel like a tutor speaking directly to her, not a textbook.`;
    return this.call(prompt, sys);
  },

  // Feature 3: Error pattern detection
  async analyzeErrors(errorLog) {
    if (!errorLog || !errorLog.length) return 'No errors logged yet. Complete some drills to see your pattern analysis here.';
    const sys = `You are an SAT tutor analyzing student error patterns. ${this.studentCtx()} Be specific and actionable. Under 160 words. Speak directly to the student as "you."`;
    const recent = errorLog.slice(-25);
    const prompt = `Analyze these ${recent.length} error records and identify top patterns:
${JSON.stringify(recent, null, 2)}

Tell the student: (1) her #1 most common error pattern or trap type with a count; (2) what specific behavior triggers it (be concrete — not "rushing" but "reading the first sentence before the second is complete"); (3) the single most important behavioral change to make; (4) a brief word of encouragement. Format as 2-3 natural paragraphs.`;
    return this.call(prompt, sys);
  },

  // Feature 4: Adaptive drill generation
  async generateDrills(errorPatterns, moduleTitle) {
    const sys = `You are generating SAT practice questions. ${this.studentCtx()} Respond ONLY in valid JSON — no markdown fences, no preamble, no commentary.`;
    const patternDesc = errorPatterns.length
      ? errorPatterns.map(p => `${p.type} (${p.count}x)`).join(', ')
      : 'general practice';
    const prompt = `Generate 3 new SAT-style practice questions for module: "${moduleTitle}".
Error patterns to target: ${patternDesc}

Respond with ONLY this exact JSON (no markdown, no extra text):
{"drills":[{"num":"AI Question 1 of 3","passage":"context sentence or empty string","stem":"question stem here","choices":["A option text","B option text","C option text","D option text"],"correct":0,"explanation":"why correct is right and why each wrong choice is wrong","trap":"specific trap this question targets"}]}

Make questions realistic SAT difficulty. Vary the formats. Use the module topic.`;
    const raw = await this.call(prompt, sys);
    try {
      const clean = raw.replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(clean);
      return parsed.drills || null;
    } catch(e) { return null; }
  },

  // Feature 2: AI tutor chat
  async chat(message, lessonCtx, errorLog) {
    const recentErrors = (errorLog || []).slice(-6).map(e => `${e.trapType||'general'} in ${e.lessonTitle||e.lessonId}`).join('; ') || 'none yet';
    const sys = `You are Haley's personal SAT tutor. ${this.studentCtx()}
Current lesson: "${lessonCtx?.title || 'none'}" in "${lessonCtx?.module || 'general'}".
Recent errors: ${recentErrors}.
Instructions: Be concise (under 130 words unless a longer explanation is genuinely needed). Be warm, direct, and specific to SAT prep. If she asks for a practice question, generate one in plain text. If she asks about a concept, explain it with a concrete example. Never lecture beyond what she asked.`;
    return this.call(message, sys);
  }
};

   ================================================================ */
const AB = {
  synth: window.speechSynthesis,
  rate: 1.0, speaking: false, current: null,
  speeds: [0.8, 1.0, 1.2, 1.5], speedIdx: 1,

  speak(text, onEnd) {
    this.stop();
    if (!text) return;
    const utt = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g,''));
    utt.rate = this.rate; utt.lang = 'en-US';
    this.current = utt; this.speaking = true;
    const abText = document.getElementById('ab-text');
    const abPlay = document.getElementById('ab-play');
    const abIcon = document.getElementById('ab-icon');
    if (abText) { abText.textContent = text.replace(/<[^>]*>/g,'').slice(0,110)+'…'; abText.classList.add('speaking'); }
    if (abIcon) abIcon.setAttribute('d','M3 2h2v8H3zm4 0h2v8H7z');
    if (abPlay) abPlay.classList.add('active');
    utt.onend = () => {
      this.speaking = false;
      if (abText) { abText.textContent = 'Narration complete.'; abText.classList.remove('speaking'); }
      if (abIcon) abIcon.setAttribute('d','M3 2l7 4-7 4z');
      if (abPlay) abPlay.classList.remove('active');
      if (onEnd) onEnd();
    };
    utt.onerror = () => { this.speaking = false; };
    this.synth.speak(utt);
  },

  stop() {
    this.synth.cancel(); this.speaking = false;
    const abText = document.getElementById('ab-text');
    const abIcon = document.getElementById('ab-icon');
    const abPlay = document.getElementById('ab-play');
    if (abText) { abText.textContent = 'Stopped.'; abText.classList.remove('speaking'); }
    if (abIcon) abIcon.setAttribute('d','M3 2l7 4-7 4z');
    if (abPlay) abPlay.classList.remove('active');
  },

  toggle() {
    if (this.speaking) { this.synth.pause(); this.speaking = false; }
    else if (this.synth.paused) { this.synth.resume(); this.speaking = true; }
  },

  cycleSpeed() {
    this.speedIdx = (this.speedIdx + 1) % this.speeds.length;
    this.rate = this.speeds[this.speedIdx];
    const el = document.getElementById('ab-speed');
    if (el) el.textContent = this.rate + '×';
  }
};

  next() { if(this.current<this.slides.length-1){this.current++;this.refresh();AB.stop();} },
  prev() { if(this.current>0){this.current--;this.refresh();AB.stop();} },
  goto(n) { this.current=n;this.refresh();AB.stop(); },
  playNarration() {
    const s=this.slides[this.current];
    AB.speak(s.audio,()=>{if(this.current<this.slides.length-1){this.current++;this.refresh();this.playNarration();}});
  },
  toggleTranscript() {
    this.transcriptOpen=!this.transcriptOpen;
    const el=document.getElementById('vp-transcript');
    const btn=el?el.previousElementSibling:null;
    if(el)el.classList.toggle('open',this.transcriptOpen);
    if(btn)btn.textContent=this.transcriptOpen?'▲ Hide transcript':'▼ View full transcript';
  },
  refresh() { R.renderLesson(CE.currentLesson()); }
};

/* ================================================================
   COURSE ENGINE (CE)
   Navigation, state, progress, error log.
   ================================================================ */
const CE = {
  state:{moduleId:'m0',lessonId:'m0l1'},
  progress:{}, errorLog:[],

  init() {
    try { this.progress=JSON.parse(localStorage.getItem('hc_course_progress')||'{}'); } catch(e){this.progress={};}
    try { this.errorLog=JSON.parse(localStorage.getItem('hc_error_log')||'[]'); } catch(e){this.errorLog=[];}
    this.buildSidebar();
    this.navigateTo('m0','m0l1');
    setTimeout(() => Google.init(), 500);
  },

  navigateTo(moduleId,lessonId) {
    this.state.moduleId=moduleId; this.state.lessonId=lessonId;
    AB.stop();
    const lesson=this.currentLesson();
    if(lesson&&lesson.type==='video')VP.load(lesson);
    R.renderLesson(lesson);
    this.buildSidebar();
    this.updateProgressBar();
    document.getElementById('content').scrollTop=0;
  },

  currentModule() { return COURSE_CONFIG.modules.find(m=>m.id===this.state.moduleId)||COURSE_CONFIG.modules[0]; },
  currentLesson() { const mod=this.currentModule(); return mod.lessons.find(l=>l.id===this.state.lessonId)||mod.lessons[0]; },

  markComplete(lessonId) {
    this.progress[lessonId]=true;
    try{localStorage.setItem('hc_course_progress',JSON.stringify(this.progress));}catch(e){}
    this.buildSidebar(); this.updateProgressBar();
    const lesson = this.allLessons().find(l=>l.id===lessonId);
    if (lesson) Google.syncComplete(lesson);
  },

  isComplete(lessonId) { return !!this.progress[lessonId]; },

  allLessons() { return COURSE_CONFIG.modules.flatMap(m=>m.lessons); },

  nextLesson() {
    const all=this.allLessons();
    const idx=all.findIndex(l=>l.id===this.state.lessonId);
    return idx<all.length-1?all[idx+1]:null;
  },

  prevLesson() {
    const all=this.allLessons();
    const idx=all.findIndex(l=>l.id===this.state.lessonId);
    return idx>0?all[idx-1]:null;
  },

  moduleForLesson(lessonId) { return COURSE_CONFIG.modules.find(m=>m.lessons.some(l=>l.id===lessonId)); },

  // Error log methods
  logError(entry) {
    this.errorLog.push({...entry,timestamp:Date.now()});
    try{localStorage.setItem('hc_error_log',JSON.stringify(this.errorLog));}catch(e){}
    Google.syncError(entry);
  },

  getErrorPatterns() {
    const freq={};
    this.errorLog.forEach(e=>{const k=e.trapType||e.lessonId;freq[k]=(freq[k]||0)+1;});
    return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([type,count])=>({type,count}));
  },

  updateProgressBar() {
    const all=this.allLessons();
    const done=all.filter(l=>this.isComplete(l.id)).length;
    const pct=Math.round(done/all.length*100);
    const fill=document.getElementById('progress-fill');
    const label=document.getElementById('progress-label');
    const topbar=document.getElementById('topbar-current');
    if(fill)fill.style.width=pct+'%';
    if(label)label.textContent=`${done} / ${all.length} complete`;
    if(topbar)topbar.textContent=this.currentLesson()?.title||'';
  },

  buildSidebar() {
    const sb=document.getElementById('sidebar');
    const s=COURSE_CONFIG.student;
    const errCount=this.errorLog.length;
    let html=`
      <div class="sb-header">
        <div class="sb-logo">SAT Prep Course</div>
        <div class="sb-student">${s.name} · Grade ${s.grade} · ${s.state}</div>
        <div class="sb-score-row">
          <div class="sb-score"><div class="sb-score-n" style="color:#E8533A">${s.baseline.total}</div><div class="sb-score-l">Baseline</div></div>
          <div class="sb-score"><div class="sb-score-n" style="color:#6366F1">${s.target.total}</div><div class="sb-score-l">Target</div></div>
        </div>
      </div>
      <div class="sb-divider"></div>
      <button class="sb-ai-btn" onclick="ErrorPanel.open()">
        <span class="ai-dot"></span>
        Analyze my error patterns ${errCount>0?`<span style="margin-left:auto;font-size:10px;opacity:.7">${errCount} logged</span>`:''}
      </button>
      <div style="margin-bottom:8px"></div>`;

    COURSE_CONFIG.modules.forEach(mod=>{
      const isActiveModule=mod.id===this.state.moduleId;
      const hasActiveLesson=mod.lessons.some(l=>l.id===this.state.lessonId);
      const isOpen=isActiveModule||hasActiveLesson;
      html+=`
        <div class="module-group">
          <div class="module-header${isActiveModule?' active':''}${isOpen?' open':''}" onclick="CE.toggleModule('${mod.id}')">
            <span class="module-dot" style="background:${mod.color}"></span>
            <span class="module-title">${mod.icon} ${mod.title}</span>
            <span class="module-count">${mod.lessons.length}</span>
            <span class="module-chevron">›</span>
          </div>
          <div class="lesson-list${isOpen?' open':''}">
            ${mod.lessons.map(l=>{
              const isActive=l.id===this.state.lessonId;
              const isDone=this.isComplete(l.id);
              const tc={video:'#7C4DFF',drill:'#00897B',resource:'#0288D1',resources:'#78909C',reading:'#455A64'};
              return `<div class="lesson-item${isActive?' active':''}${isDone?' done':''}" onclick="CE.navigateToLesson('${l.id}')">
                <span class="lesson-dot" style="${isActive?`background:${mod.color}`:''}"></span>
                <span class="lesson-name">${l.title}</span>
                <span style="font-size:9px;padding:1px 5px;border-radius:3px;border:1px solid;color:${tc[l.type]||'#999'};border-color:${tc[l.type]||'#999'}33;background:${tc[l.type]||'#999'}11">${l.type}</span>
              </div>`;
            }).join('')}
          </div>
        </div>`;
    });
    html += Google.renderPanel();
    sb.innerHTML=html;
  },

  toggleModule(moduleId) {
    const headers=document.querySelectorAll('.module-header');
    const lists=document.querySelectorAll('.lesson-list');
    headers.forEach((h,i)=>{
      const thisId=COURSE_CONFIG.modules[i]?.id;
      if(thisId===moduleId){h.classList.toggle('open');lists[i].classList.toggle('open');}
    });
  },

  navigateToLesson(lessonId) {
    const mod=this.moduleForLesson(lessonId);
    if(mod)this.navigateTo(mod.id,lessonId);
  }
};

/* ================================================================
   RENDERER (R)
   Renders all lesson types + AI integration hooks.
   ================================================================ */
const R = {
  drillRegistry: {}, // stores drill data by id for AI access

  renderLesson(lesson) {
    if(!lesson)return;
    const mod=CE.currentModule();
    const content=document.getElementById('content');
    let html=`
      <div class="lesson-header">
        <div class="lesson-eyebrow" style="color:${mod.color}">${lesson.eyebrow}</div>
        <h1 class="lesson-title">${lesson.title}</h1>
        <div class="lesson-meta">
          <span>⏱ ${lesson.duration}</span>
          <span style="text-transform:capitalize">· ${lesson.type} lesson</span>
          ${lesson.type==='drill'?'<span style="color:#6366F1;font-weight:500">· ✦ AI-powered feedback</span>':''}
        </div>
      </div>`;
    switch(lesson.type){
      case 'video':   html+=this.renderVideo(lesson); break;
      case 'reading': html+=this.renderReading(lesson); break;
      case 'drill':   html+=this.renderDrill(lesson); break;
      case 'resource':html+=this.renderResource(lesson); break;
      case 'resources':html+=this.renderResources(lesson); break;
    }
    html+=this.renderNav();
    content.innerHTML=html;
  },

  renderVideo(lesson) {
    return `<button class="listen-btn" onclick="AB.speak(this.dataset.text)" data-text="${lesson.slides.map(s=>s.audio).join(' ').replace(/"/g,'&quot;')}">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6z"/></svg>
      Listen to full lesson
    </button>${VP.render()}`;
  },

  renderReading(lesson) {
    let html=`<button class="listen-btn" onclick="AB.speak(this.dataset.text)" data-text="${(lesson.audioScript||'').replace(/"/g,'&quot;').replace(/`/g,'')}">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6z"/></svg>
      Listen to this lesson
    </button>`;
    (lesson.content||[]).forEach(b=>{
      if(b.type==='text')html+=`<div class="text-block">${b.html}</div>`;
      else if(b.type==='callout')html+=`<div class="callout ${b.style}">${b.text}</div>`;
      else if(b.type==='scores')html+=this.renderScores();
      else if(b.type==='domains')html+=this.renderDomains();
    });
    return html;
  },

  renderDrill(lesson) {
    const mod=CE.currentModule();
    let html=`<button class="listen-btn" onclick="AB.speak(this.dataset.text)" data-text="${(lesson.audioScript||'').replace(/"/g,'&quot;').replace(/`/g,'')}">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6z"/></svg>
      Listen to drill instructions
    </button>
    <div class="callout blue" style="margin-bottom:20px">
      <strong>✦ AI Tutor is active.</strong> When you answer incorrectly, the AI will explain specifically why your answer was wrong and give you personalized guidance. You can also click "Review this concept" to get a targeted mini-lesson before trying again.
    </div>
    <div class="drill-section">`;

    (lesson.drills||[]).forEach((d,qi)=>{
      const id=`drill_${lesson.id}_${qi}`;
      // Register drill for AI access
      this.drillRegistry[id]={
        drill:d,
        lessonCtx:{title:lesson.title,module:mod.title,moduleId:mod.id},
        reviewLesson:lesson.reviewLesson||null
      };
      html+=`
        <div class="drill-card" id="${id}">
          <div class="drill-num">${d.num}</div>
          ${d.passage?`<div class="drill-passage">${d.passage}</div>`:''}
          <div class="drill-stem">${d.stem}</div>
          <div class="drill-choices" id="${id}_choices">
            ${d.choices.map((c,ci)=>`
              <div class="drill-choice" onclick="R.pick('${id}',${ci})">
                <span class="ltr">${['A','B','C','D'][ci]}</span>${c}
              </div>`).join('')}
          </div>
          <button class="drill-reveal" onclick="R.reveal('${id}_exp')">Reveal explanation</button>
          <div class="drill-explanation" id="${id}_exp">
            <div class="exp-correct">Correct answer: ${['A','B','C','D'][d.correct]}) ${d.choices[d.correct]}</div>
            <div class="exp-body">${d.explanation}</div>
            ${d.trap?`<div class="exp-trap">⚠ ${d.trap}</div>`:''}
          </div>
        </div>`;
    });

    html+='</div>';

    // Adaptive drill section
    html+=`
      <div class="adaptive-section">
        <div class="adaptive-header">
          <span>✦</span> AI-Generated Practice Questions
        </div>
        <div class="adaptive-desc">
          Finished the drills above? Generate new questions targeted to your specific error patterns. The AI analyzes what you have gotten wrong and writes new questions designed to address those exact gaps.
        </div>
        <button class="gen-btn" id="gen-btn-${lesson.id}" onclick="R.generateAdaptiveDrills('${lesson.id}','${mod.title.replace(/'/g,'\\\'')}')" >
          Generate questions for me
        </button>
        <div id="adaptive-container-${lesson.id}"></div>
      </div>`;

    return html;
  },

  renderResource(lesson) {
    return `<button class="listen-btn" onclick="AB.speak(this.dataset.text)" data-text="${(lesson.audioScript||'').replace(/"/g,'&quot;')}">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6z"/></svg>
      Listen to overview
    </button>
    <div class="text-block"><p>${lesson.resourceDesc}</p></div>
    <div class="resource-grid" style="grid-template-columns:1fr">
      <a href="${lesson.resourceFile}" target="_blank" class="resource-card" style="border-color:${CE.currentModule().color}33">
        <div class="rc-title">${lesson.resourceLabel}</div>
        <div class="rc-desc">${lesson.resourceDesc}</div>
        <div class="rc-open" style="color:${CE.currentModule().color}">Open in new tab →</div>
      </a>
    </div>`;
  },

  renderResources(lesson) {
    let html=`<button class="listen-btn" onclick="AB.speak(this.dataset.text)" data-text="${(lesson.audioScript||'').replace(/"/g,'&quot;')}">
      <svg viewBox="0 0 16 16" fill="currentColor"><path d="M3 2l10 6-10 6z"/></svg>
      Listen to overview
    </button><div class="resource-grid">`;
    (lesson.resources||[]).forEach(r=>{
      html+=`<a href="${r.file}" target="_blank" class="resource-card">
        <div class="rc-num" style="color:${r.color}">Deliverable ${r.num}</div>
        <div class="rc-title">${r.title}</div>
        <div class="rc-desc">${r.desc}</div>
        <div class="rc-open" style="color:${r.color}">Open file →</div>
      </a>`;
    });
    return html+'</div>';
  },

  renderScores() {
    const s=COURSE_CONFIG.student;
    return `<div class="score-grid">
      <div class="score-box"><div class="score-n" style="color:#E8533A">${s.baseline.total}</div><div class="score-l">PSAT Total</div></div>
      <div class="score-box"><div class="score-n" style="color:#0288D1">${s.baseline.rw}</div><div class="score-l">R&W (32nd %ile)</div></div>
      <div class="score-box"><div class="score-n" style="color:#7C4DFF">${s.baseline.math}</div><div class="score-l">Math (51st %ile)</div></div>
      <div class="score-box"><div class="score-n" style="color:#2E7D32">${s.target.total}+</div><div class="score-l">8-Wk Target</div></div>
    </div>`;
  },

  renderDomains() {
    const domains=[
      {name:'Expression of Ideas',score:'370–410',pct:40,color:'#E53935',tag:'Priority',tc:'dt-red'},
      {name:'Information and Ideas',score:'420–480',pct:52,color:'#FB8C00',tag:'Build',tc:'dt-amber'},
      {name:'Standard English Conventions',score:'420–480',pct:52,color:'#FB8C00',tag:'Build',tc:'dt-amber'},
      {name:'Craft and Structure',score:'490–540',pct:72,color:'#43A047',tag:'Strength',tc:'dt-green'},
      {name:'Algebra',score:'420–460',pct:44,color:'#E53935',tag:'Priority',tc:'dt-red'},
      {name:'Advanced Math',score:'420–460',pct:44,color:'#E53935',tag:'Priority',tc:'dt-red'},
      {name:'Data Analysis',score:'550–600',pct:82,color:'#43A047',tag:'Strength',tc:'dt-green'},
      {name:'Geometry & Trig',score:'550–600',pct:82,color:'#43A047',tag:'Strength',tc:'dt-green'}
    ];
    return `<div class="domain-list">${domains.map(d=>`
      <div class="domain-row">
        <span class="d-name">${d.name}</span>
        <div class="d-track"><div class="d-fill" style="width:${d.pct}%;background:${d.color}"></div></div>
        <span class="d-score">${d.score}</span>
        <span class="d-tag ${d.tc}">${d.tag}</span>
      </div>`).join('')}</div>`;
  },

  renderNav() {
    const prev=CE.prevLesson();
    const next=CE.nextLesson();
    const curr=CE.currentLesson();
    return `<div class="lesson-nav">
      ${prev?`<button class="ln-btn" onclick="CE.navigateToLesson('${prev.id}')">← ${prev.title}</button>`:'<div></div>'}
      <div>
        ${CE.isComplete(curr?.id)
          ?'<span style="font-size:13px;color:var(--text3)">✓ Completed</span>'
          :`<button class="ln-btn primary" onclick="CE.markComplete('${curr?.id}');this.textContent='✓ Marked complete'">Mark complete</button>`}
      </div>
      ${next?`<button class="ln-btn" onclick="CE.navigateToLesson('${next.id}')">Next: ${next.title} →</button>`:'<span style="color:var(--text3);font-size:13px">Course complete 🎉</span>'}
    </div>`;
  },

  // AI Feature 1 (Priority): Personalized wrong-answer feedback
  async pick(drillId, chosen) {
    const reg=this.drillRegistry[drillId];
    if(!reg)return;
    const {drill,lessonCtx}=reg;
    const correct=drill.correct;

    const choices=document.querySelectorAll(`#${drillId}_choices .drill-choice`);
    choices.forEach((el,i)=>{
      el.style.pointerEvents='none';
      if(i===correct)el.classList.add('correct');
      else if(i===chosen&&chosen!==correct)el.classList.add('wrong');
    });

    if(chosen!==correct){
      // Log the error
      CE.logError({
        lessonId:CE.state.lessonId,
        lessonTitle:lessonCtx.title,
        module:lessonCtx.module,
        questionId:drillId,
        chosen:drill.choices[chosen],
        correct:drill.choices[correct],
        trapType:drill.trap||'general',
        chosenIdx:chosen,
        correctIdx:correct
      });
      CE.buildSidebar(); // refresh error count in sidebar

      // Show AI feedback panel (loading state)
      const card=document.getElementById(drillId);
      const fb=document.createElement('div');
      fb.id=`${drillId}_ai`;
      fb.className='ai-feedback-panel';
      fb.innerHTML=`
        <div class="ai-feedback-label">✦ AI Tutor — Personalized Feedback</div>
        <div class="ai-loading"><div class="ai-dots"><span></span><span></span><span></span></div> Analyzing your answer...</div>`;
      card.appendChild(fb);

      // Get AI explanation
      const explanation=await AI.explainWrongAnswer(drill,chosen,correct,lessonCtx);
      fb.innerHTML=`
        <div class="ai-feedback-label">✦ AI Tutor — Personalized Feedback</div>
        <div class="ai-feedback-text">${explanation}</div>
        <div class="ai-feedback-actions">
          <button class="ai-action-btn ai-action-primary" onclick="Review.open('${drillId}',${chosen},${correct})">Review this concept →</button>
          <button class="ai-action-btn ai-action-secondary" onclick="R.resetDrill('${drillId}')">Try again</button>
        </div>`;

      // Speak the feedback
      AB.speak(explanation);
    }
  },

  // Feature 5: Reset drill for retry (used by Review.returnAndRetry)
  resetDrill(drillId) {
    const choices=document.querySelectorAll(`#${drillId}_choices .drill-choice`);
    choices.forEach(el=>{
      el.style.pointerEvents='auto';
      el.classList.remove('correct','wrong');
    });
    const fb=document.getElementById(`${drillId}_ai`);
    if(fb)fb.remove();
  },

  // Feature 4: Adaptive drill generation
  async generateAdaptiveDrills(lessonId, moduleTitle) {
    const btn=document.getElementById(`gen-btn-${lessonId}`);
    const container=document.getElementById(`adaptive-container-${lessonId}`);
    if(!btn||!container)return;
    btn.disabled=true; btn.textContent='Generating...';
    container.innerHTML=`<div class="ai-loading" style="margin-top:18px"><div class="ai-dots"><span></span><span></span><span></span></div> Building questions from your error patterns...</div>`;

    const patterns=CE.getErrorPatterns();
    const drills=await AI.generateDrills(patterns,moduleTitle);

    btn.disabled=false; btn.textContent='Generate more questions';

    if(!drills){
      container.innerHTML='<p style="color:var(--text3);font-size:13px;margin-top:14px">Could not generate questions. Please try again in a moment.</p>';
      return;
    }

    let html='<div style="margin-top:20px">';
    drills.forEach((d,qi)=>{
      const ts=Date.now();
      const id=`adp_${lessonId}_${ts}_${qi}`;
      this.drillRegistry[id]={
        drill:d,
        lessonCtx:{title:'AI Practice',module:moduleTitle,moduleId:CE.state.moduleId},
        reviewLesson:CE.currentLesson()?.reviewLesson||null
      };
      html+=`
        <div class="drill-card" id="${id}" style="border-color:rgba(99,102,241,.3)">
          <div class="drill-num" style="color:#6366F1">${d.num} <span class="ai-drill-badge">AI Generated</span></div>
          ${d.passage?`<div class="drill-passage">${d.passage}</div>`:''}
          <div class="drill-stem">${d.stem}</div>
          <div class="drill-choices" id="${id}_choices">
            ${d.choices.map((c,ci)=>`<div class="drill-choice" onclick="R.pick('${id}',${ci})"><span class="ltr">${['A','B','C','D'][ci]}</span>${c}</div>`).join('')}
          </div>
          <button class="drill-reveal" onclick="R.reveal('${id}_exp')">Reveal explanation</button>
          <div class="drill-explanation" id="${id}_exp">
            <div class="exp-correct">Correct: ${['A','B','C','D'][d.correct]}) ${d.choices[d.correct]}</div>
            <div class="exp-body">${d.explanation}</div>
            ${d.trap?`<div class="exp-trap">⚠ ${d.trap}</div>`:''}
          </div>
        </div>`;
    });
    container.innerHTML=html+'</div>';
  },

  reveal(id) {
    const el=document.getElementById(id);
    if(!el)return;
    el.classList.toggle('open');
    const btn=el.previousElementSibling;
    if(btn)btn.textContent=el.classList.contains('open')?'Hide explanation':'Reveal explanation';
  }
};

/* ================================================================
   REVIEW SYSTEM
   Feature 5: Branching concept review overlay.
   ================================================================ */
const Review = {
  currentDrillId: null,

  async open(drillId, chosenIdx, correctIdx) {
    this.currentDrillId = drillId;
    const overlay = document.getElementById('review-overlay');
    const content = document.getElementById('review-content');
    const sub = document.getElementById('review-sub');
    overlay.classList.add('open');

    const reg = R.drillRegistry[drillId];
    if (!reg) return;

    const returnBtn = document.getElementById('review-return-btn');
    if (returnBtn) returnBtn.style.display = '';

    if (sub) sub.textContent = `For: "${reg.lessonCtx.module}"`;
    content.innerHTML = '<div class="ai-loading"><div class="ai-dots"><span></span><span></span><span></span></div> Generating targeted review...</div>';

    const reviewText = await AI.getBranchReview(reg.drill, chosenIdx, correctIdx, reg.lessonCtx.module);
    content.innerHTML = `<p>${reviewText}</p>`;
    AB.speak(reviewText);
  },

  returnAndRetry() {
    document.getElementById('review-overlay').classList.remove('open');
    AB.stop();
    if (this.currentDrillId) {
      R.resetDrill(this.currentDrillId);
      // Scroll to the drill
      const el = document.getElementById(this.currentDrillId);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    this.currentDrillId = null;
  },

  close() {
    document.getElementById('review-overlay').classList.remove('open');
    AB.stop();
    this.currentDrillId = null;
  }
};

/* ================================================================
   CHAT SYSTEM
   Feature 2: AI tutor chat drawer.
   ================================================================ */
const Chat = {
  initialized: false,

  open() {
    document.getElementById('chat-drawer').classList.add('open');
    if (!this.initialized) {
      this.initialized = true;
      const lesson = CE.currentLesson();
      this.addMessage('ai', `Hi Haley! I'm your AI tutor. Ask me anything about this lesson — "${lesson?.title||'the current lesson'}" — or any SAT concept. I can also generate a quick practice question if you want more reps.`);
    }
    setTimeout(() => document.getElementById('chat-input')?.focus(), 300);
  },

  close() {
    document.getElementById('chat-drawer').classList.remove('open');
  },

  addMessage(role, text) {
    const container = document.getElementById('chat-messages');
    if (!container) return;
    const div = document.createElement('div');
    div.className = `chat-msg ${role}`;
    div.innerHTML = `<div class="chat-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  },

  async send() {
    const input = document.getElementById('chat-input');
    if (!input) return;
    const msg = input.value.trim();
    if (!msg) return;
    input.value = '';
    this.addMessage('user', msg);

    const loadingId = 'chat-loading-' + Date.now();
    const container = document.getElementById('chat-messages');
    const loadDiv = document.createElement('div');
    loadDiv.id = loadingId;
    loadDiv.className = 'chat-msg ai';
    loadDiv.innerHTML = '<div class="chat-bubble"><div class="ai-loading"><div class="ai-dots"><span></span><span></span><span></span></div></div></div>';
    container.appendChild(loadDiv);
    container.scrollTop = container.scrollHeight;

    const lesson = CE.currentLesson();
    const response = await AI.chat(msg, {title:lesson?.title,module:CE.currentModule()?.title}, CE.errorLog);

    document.getElementById(loadingId)?.remove();
    this.addMessage('ai', response);
  }
};

/* ================================================================
   ERROR PANEL
   Feature 3: Error pattern detection modal.
   ================================================================ */
const ErrorPanel = {
  async open() {
    const overlay = document.getElementById('review-overlay');
    const content = document.getElementById('review-content');
    const title = document.getElementById('review-title');
    const sub = document.getElementById('review-sub');
    const returnBtn = document.getElementById('review-return-btn');

    if (title) title.textContent = 'Your Error Pattern Report';
    if (sub) sub.textContent = `Based on ${CE.errorLog.length} recorded responses`;
    if (returnBtn) returnBtn.style.display = 'none';
    overlay.classList.add('open');

    if (!CE.errorLog.length) {
      content.innerHTML = '<p style="color:var(--text3);font-size:14px">No errors logged yet. Complete some drill lessons and come back — the AI will analyze your specific error patterns and tell you exactly what to focus on.</p>';
      return;
    }

    // Show raw error frequency bars first
    const patterns = CE.getErrorPatterns();
    const maxCount = patterns[0]?.count || 1;
    const barsHtml = patterns.map(p => `
      <div class="error-bar-row">
        <span style="flex:1;font-size:12px;color:var(--text2)">${p.type}</span>
        <div class="error-bar-track" style="max-width:160px">
          <div class="error-bar-fill" style="width:${Math.round(p.count/maxCount*100)}%"></div>
        </div>
        <span class="error-count">${p.count}×</span>
      </div>`).join('');

    content.innerHTML = `
      <div class="error-bars" style="margin-bottom:20px">${barsHtml}</div>
      <div class="ai-loading"><div class="ai-dots"><span></span><span></span><span></span></div> Generating AI analysis...</div>`;

    const analysis = await AI.analyzeErrors(CE.errorLog);
    const loadingEl = content.querySelector('.ai-loading');
    if (loadingEl) {
      const aiDiv = document.createElement('div');
      aiDiv.innerHTML = `<div class="ai-feedback-panel" style="margin-top:0"><div class="ai-feedback-label">✦ AI Analysis</div><div class="ai-feedback-text">${analysis.replace(/\n/g,'<br>')}</div></div>`;
      loadingEl.replaceWith(aiDiv);
    }
    AB.speak(analysis);
  }
};


/* ================================================================
   GOOGLE INTEGRATION (minimal — expands when credentials added)
   ================================================================ */
const Google = {
  token: null,
  userInfo: null,
  get configured() { return GOOGLE_CONFIG.configured === true; },

  init() {
    if (!this.configured) return;
    const script = document.createElement('script');
    script.src = 'https://accounts.google.com/gsi/client';
    script.onload = () => this.initTokenClient();
    document.head.appendChild(script);
    try {
      const t = sessionStorage.getItem('g_token');
      if (t) { this.token = t; this.fetchUserInfo(); }
    } catch(e) {}
  },

  initTokenClient() {
    try {
      const scopes = [
        'https://www.googleapis.com/auth/spreadsheets',
        'https://www.googleapis.com/auth/classroom.coursework.students',
        'https://www.googleapis.com/auth/classroom.announcements',
        'https://www.googleapis.com/auth/drive.file'
      ].join(' ');
      this.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CONFIG.CLIENT_ID,
        scope: scopes,
        callback: (resp) => {
          if (resp.error) return;
          this.token = resp.access_token;
          try { sessionStorage.setItem('g_token', this.token); } catch(e) {}
          this.fetchUserInfo();
        }
      });
    } catch(e) { console.warn('GIS init error:', e); }
  },

  signIn() {
    if (!this.configured) { alert('Add your Google Client ID to GOOGLE_CONFIG first.'); return; }
    if (!this.tokenClient) { alert('Google not loaded yet. Please wait a moment and try again.'); return; }
    this.tokenClient.requestAccessToken();
  },

  signOut() {
    this.token = null; this.userInfo = null;
    try { sessionStorage.removeItem('g_token'); } catch(e) {}
    this.updateBar(false); CE.buildSidebar();
  },

  isReady() { return !!(this.token && this.configured); },

  async fetchUserInfo() {
    if (!this.token) return;
    try {
      const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',
        { headers: { Authorization: 'Bearer ' + this.token } });
      if (!r.ok) { this.token = null; return; }
      this.userInfo = await r.json();
      this.updateBar(true);
      CE.buildSidebar();
      this.pullProgress();
    } catch(e) {}
  },

  updateBar(on) {
    let bar = document.getElementById('g-bar');
    if (on && this.userInfo) {
      if (!bar) {
        bar = document.createElement('div');
        bar.id = 'g-bar';
        bar.style.cssText = 'position:fixed;top:52px;left:268px;right:0;height:36px;background:linear-gradient(135deg,#E8F0FE,#F0EDFF);border-bottom:1px solid rgba(26,115,232,.15);display:flex;align-items:center;padding:0 20px;gap:10px;font-size:12px;color:#1A3A6E;z-index:90;font-family:inherit';
        document.body.appendChild(bar);
        document.getElementById('layout').style.paddingTop = '88px';
      }
      const name = this.userInfo.given_name || 'Haley';
      bar.innerHTML = `<span style="width:22px;height:22px;border-radius:50%;background:#6366F1;color:#fff;font-size:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center">${name[0]}</span>
        <strong>${name}</strong> · Google Connected
        <span id="sync-status" style="margin-left:auto;font-size:11px;color:#1E8E3E">✓ Synced</span>
        <button onclick="Google.signOut()" style="font-size:11px;background:none;border:none;cursor:pointer;color:rgba(26,58,110,.5);margin-left:8px">Sign out</button>`;
    } else if (bar) {
      bar.remove();
      document.getElementById('layout').style.paddingTop = '';
    }
  },

  setSyncing(on) {
    const el = document.getElementById('sync-status');
    if (el) el.textContent = on ? '⟳ Syncing...' : '✓ Synced';
  },

  async sheetsAppend(range, values) {
    if (!this.isReady()) return;
    this.setSyncing(true);
    try {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/${range}:append?valueInputOption=USER_ENTERED`,
        { method:'POST', headers:{ Authorization:'Bearer '+this.token,'Content-Type':'application/json' },
          body: JSON.stringify({ values: [values] }) });
    } catch(e) {}
    this.setSyncing(false);
  },

  async pullProgress() {
    if (!this.isReady()) return;
    try {
      const r = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_CONFIG.SPREADSHEET_ID}/values/Progress!A:E`,
        { headers: { Authorization: 'Bearer ' + this.token } });
      const d = await r.json();
      (d.values||[]).slice(1).forEach(row => { if (row[0] && row[3]==='TRUE') CE.progress[row[0]] = true; });
      try { localStorage.setItem('hc_course_progress', JSON.stringify(CE.progress)); } catch(e) {}
      CE.buildSidebar(); CE.updateProgressBar();
    } catch(e) {}
  },

  syncError(entry) {
    this.sheetsAppend('ErrorLog!A:H', [
      new Date().toISOString(), entry.lessonId||'', entry.lessonTitle||'',
      entry.module||'', entry.questionId||'', entry.chosen||'', entry.correct||'', entry.trapType||''
    ]);
  },

  syncComplete(lesson) {
    this.sheetsAppend('Progress!A:E', [lesson.id, lesson.title, CE.currentModule().title, true, new Date().toISOString()]);
    this.classroomPost('Great work! Completed: "' + lesson.title + '"');
  },

  async classroomPost(text) {
    if (!this.isReady() || !GOOGLE_CONFIG.CLASSROOM_COURSE_ID || GOOGLE_CONFIG.CLASSROOM_COURSE_ID === 'PASTE_COURSE_ID_HERE') return;
    try {
      await fetch(`https://classroom.googleapis.com/v1/courses/${GOOGLE_CONFIG.CLASSROOM_COURSE_ID}/announcements`,
        { method:'POST', headers:{ Authorization:'Bearer '+this.token,'Content-Type':'application/json' },
          body: JSON.stringify({ text, state:'PUBLISHED' }) });
    } catch(e) {}
  },

  renderPanel() {
    if (!this.isReady()) {
      return this.configured
        ? `<div style="padding:12px 16px;border-top:1px solid #1E1E24"><button onclick="Google.signIn()" style="width:100%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:5px;color:rgba(255,255,255,.7);font-size:11px;padding:7px;cursor:pointer;font-family:inherit">Sign in with Google</button></div>`
        : '';
    }
    const lesson = CE.currentLesson();
    return `<div style="padding:12px 16px;border-top:1px solid #1E1E24">
      <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.10em;color:rgba(255,255,255,.3);margin-bottom:8px">🎓 Classroom</div>
      <button onclick="Google.classroomPost(prompt('Announcement:'))" style="display:block;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:5px;color:rgba(255,255,255,.6);font-size:11px;padding:6px 10px;cursor:pointer;margin-bottom:4px;font-family:inherit;text-align:left">📢 Post announcement</button>
      <button onclick="Google.logScoreUI()" style="display:block;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:5px;color:rgba(255,255,255,.6);font-size:11px;padding:6px 10px;cursor:pointer;font-family:inherit;text-align:left">📊 Log a score</button>
    </div>`;
  },

  logScoreUI() {
    const t = prompt('Total score:'); if (!t) return;
    const rw = prompt('R&W score:');
    const math = prompt('Math score:');
    const notes = prompt('Notes (optional):') || '';
    this.sheetsAppend('Scores!A:E', [new Date().toISOString().split('T')[0], +t, +rw, +math, notes]);
    alert('Score logged to Sheets.');
  }
};

// ================================================================
// INITIALIZE
// ================================================================
// Robust initialization
(function() {
  function start() {
    if (typeof CE !== 'undefined' && typeof COURSE_CONFIG !== 'undefined') {
      CE.init();
    } else {
      setTimeout(start, 100);
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', start);
  } else {
    start();
  }
})();
</script>
</body>
</html>
